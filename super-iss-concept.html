<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISS-001 — Concept Design Schematic</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000912;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  .outer-frame {
    position: relative; width: 1400px; height: 800px;
    border: 1px solid rgba(0,160,220,0.18);
    box-shadow: 0 0 100px rgba(0,80,160,0.12), inset 0 0 60px rgba(0,30,80,0.08);
  }
  .corner-bracket { position: absolute; width: 22px; height: 22px; }
  .cb-tl { top:10px; left:10px;  border-top:1px solid rgba(0,180,255,0.5); border-left:1px solid rgba(0,180,255,0.5); }
  .cb-tr { top:10px; right:10px; border-top:1px solid rgba(0,180,255,0.5); border-right:1px solid rgba(0,180,255,0.5); }
  .cb-bl { bottom:10px; left:10px;  border-bottom:1px solid rgba(0,180,255,0.5); border-left:1px solid rgba(0,180,255,0.5); }
  .cb-br { bottom:10px; right:10px; border-bottom:1px solid rgba(0,180,255,0.5); border-right:1px solid rgba(0,180,255,0.5); }
  svg { display: block; width: 100%; height: 100%; }

  /* ── Animations ── */
  @keyframes wh-ring-pulse  { 0%,100%{opacity:.35}  50%{opacity:.85} }
  @keyframes laser-pulse    { 0%,100%{opacity:.55}  50%{opacity:1}   }
  @keyframes flame-flicker  { 0%,100%{opacity:.85}  33%{opacity:1}   66%{opacity:.65} }
  @keyframes backup-flicker { 0%,100%{opacity:.7}   50%{opacity:.95} }
  @keyframes ring-shimmer   { 0%,100%{opacity:.82}  50%{opacity:1}   }
  @keyframes sun-spin       { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes energy-flow    { 0%{stroke-dashoffset:18} 100%{stroke-dashoffset:0} }
  @keyframes emergency-blink{ 0%,85%,100%{opacity:1} 90%{opacity:.1} }
  @keyframes callout-breathe{ 0%,100%{opacity:.5}   50%{opacity:.88} }
  @keyframes scan-line      { 0%{transform:translateY(-4px)} 100%{transform:translateY(804px)} }
  @keyframes star-twinkle   { 0%,100%{opacity:.2}   50%{opacity:1}   }

  .wh-ring  { animation: wh-ring-pulse 2.8s ease-in-out infinite; }
  .wh-ring:nth-child(2){animation-delay:.3s} .wh-ring:nth-child(3){animation-delay:.6s}
  .wh-ring:nth-child(4){animation-delay:.9s} .wh-ring:nth-child(5){animation-delay:1.2s}
  .wh-ring:nth-child(6){animation-delay:1.5s} .wh-ring:nth-child(7){animation-delay:1.8s}
  .laser-beam   { animation: laser-pulse 1.8s ease-in-out infinite; }
  .engine-flame { animation: flame-flicker .28s ease-in-out infinite; }
  .backup-flame { animation: backup-flicker .38s ease-in-out infinite; }
  .ring-collector { animation: ring-shimmer 4s ease-in-out infinite; }
  .ring-front   { animation: ring-shimmer 4s ease-in-out .5s infinite; }
  .energy-beam  { animation: energy-flow 1.2s linear infinite; }
  .emerg-light  { animation: emergency-blink 2.2s ease-in-out infinite; }
  .callout      { animation: callout-breathe 5s ease-in-out infinite; }
  .callout:nth-child(2){animation-delay:.8s}  .callout:nth-child(3){animation-delay:1.6s}
  .callout:nth-child(4){animation-delay:2.4s} .callout:nth-child(5){animation-delay:3.2s}
  .callout:nth-child(6){animation-delay:4.0s} .callout:nth-child(7){animation-delay:4.8s}
  .callout:nth-child(8){animation-delay:5.6s}
  .sun-rays-group { animation: sun-spin 22s linear infinite; transform-origin:0px 0px; transform-box:fill-box; }
  .scan-overlay {
    position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(transparent,rgba(0,200,255,0.05),transparent);
    animation:scan-line 9s linear infinite; pointer-events:none; z-index:50;
  }
</style>
</head>
<body>
<div class="outer-frame">
  <div class="corner-bracket cb-tl"></div>
  <div class="corner-bracket cb-tr"></div>
  <div class="corner-bracket cb-bl"></div>
  <div class="corner-bracket cb-br"></div>
  <div class="scan-overlay"></div>

  <svg viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bgGrad" cx="45%" cy="55%" r="65%">
        <stop offset="0%"   stop-color="#001528"/>
        <stop offset="100%" stop-color="#00080f"/>
      </radialGradient>
      <filter id="glow-sm" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-md" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-red" x="-150%" y="-150%" width="400%" height="400%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-sun" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-ring" x="-30%" y="-80%" width="160%" height="260%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-title" x="-20%" y="-50%" width="140%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- Ring mask + clips -->
      <mask id="ringBandMask">
        <rect x="0" y="0" width="1400" height="800" fill="black"/>
        <ellipse cx="660" cy="400" rx="365" ry="90" fill="white"/>
        <ellipse cx="660" cy="400" rx="210" ry="52" fill="black"/>
      </mask>
      <clipPath id="ringBackClip">
        <rect x="0" y="0" width="1400" height="400"/>
      </clipPath>
      <clipPath id="ringFrontClip">
        <rect x="0" y="400" width="1400" height="400"/>
      </clipPath>

      <!-- Station gradients -->
      <linearGradient id="habGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2a6080"/> <stop offset="45%" stop-color="#3a7898"/> <stop offset="100%" stop-color="#1a3c52"/>
      </linearGradient>
      <linearGradient id="hullGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1e3c52"/> <stop offset="40%" stop-color="#2c4e68"/> <stop offset="100%" stop-color="#142430"/>
      </linearGradient>
      <linearGradient id="cowlGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#1e3c52"/> <stop offset="100%" stop-color="#101c28"/>
      </linearGradient>
      <linearGradient id="trussGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a3448"/> <stop offset="100%" stop-color="#0e1c28"/>
      </linearGradient>
      <linearGradient id="noseGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#80b0cc"/> <stop offset="50%" stop-color="#c0d8ec"/> <stop offset="100%" stop-color="#5890b0"/>
      </linearGradient>
      <linearGradient id="mainNozzleGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#2a5878"/> <stop offset="100%" stop-color="#0c1c2c"/>
      </linearGradient>
      <linearGradient id="backupNozzleGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#4c1010"/> <stop offset="100%" stop-color="#200808"/>
      </linearGradient>
      <linearGradient id="flameGrad" x1="0" y1="0.5" x2="1" y2="0.5">
        <stop offset="0%" stop-color="#ffffff"/> <stop offset="12%" stop-color="#88ecff"/>
        <stop offset="35%" stop-color="#0066ff"/> <stop offset="65%" stop-color="#ff5500" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#ff1500" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="backupFlameGrad" x1="0" y1="0.5" x2="1" y2="0.5">
        <stop offset="0%" stop-color="#ff6600"/> <stop offset="40%" stop-color="#cc2200" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="voidGrad" cx="50%" cy="50%" r="50%">

      </linearGradient>
      <radialGradient id="sunFill" cx="50%" cy="50%" r="50%">

        <stop offset="80%" stop-color="#ffa020"/> <stop offset="100%" stop-color="#ff6000" stop-opacity="0"/>
      </radialGradient>
    </defs>

      <line x1="910" y1="0" x2="910" y2="800"/> <line x1="980" y1="0" x2="980" y2="800"/> <line x1="1050" y1="0" x2="1050" y2="800"/>
      <line x1="1120" y1="0" x2="1120" y2="800"/> <line x1="1190" y1="0" x2="1190" y2="800"/> <line x1="1260" y1="0" x2="1260" y2="800"/>

    </g>
    <g id="stars"></g>
    <line x1="100" y1="400" x2="1200" y2="400" stroke="rgba(0,120,200,0.08)" stroke-width="0.8" stroke-dasharray="10,8"/>

    <!-- ═══ VERTICAL TITLE — left margin ═══ -->
    <line x1="44" y1="30" x2="44" y2="770" stroke="rgba(0,160,220,0.2)" stroke-width="0.8"/>
    <g transform="translate(22, 400) rotate(-90)" filter="url(#glow-title)">
      <text text-anchor="middle" font-family="Orbitron" font-weight="900" font-size="14"
            letter-spacing="9" fill="#ffffff" opacity="0.9">
        SUPER INTERNATIONAL SPACE STATION
      </text>
      <text text-anchor="middle" y="20" font-family="Share Tech Mono" font-size="8.5"
            letter-spacing="5" fill="#3aa8cc" opacity="0.7">
        CONCEPT DESIGN SCHEMATIC — SISS-001 — REV. A
      </text>
    </g>

    <!-- Doc meta (SVG text, inside frame) -->
    <text x="58" y="28" font-family="Share Tech Mono" font-size="7.5" fill="#162840" letter-spacing="1" opacity="0.8">PROJECT: SISS-001  |  DATE: 2026-03-12  |  CLASS: CONCEPT</text>
    <text x="1370" y="28" text-anchor="end" font-family="Share Tech Mono" font-size="7.5" fill="#162840" letter-spacing="1" opacity="0.8">POWER: ANNULAR SOLAR RING  |  CREW: 24  |  PROPULSION: ION + SPACETIME FOLD</text>
    <text x="700" y="785" text-anchor="middle" font-family="Share Tech Mono" font-size="7.5" fill="#162840" letter-spacing="3" opacity="0.6">SUPER INTERNATIONAL SPACE STATION — SISS-001 — CONCEPT DESIGN SCHEMATIC — UNCLASSIFIED</text>

    <!-- ═══ RING COLLECTOR — BACK ARC (drawn before station) ═══ -->
    <g id="ring-collector-back" clip-path="url(#ringBackClip)" class="ring-collector" filter="url(#glow-ring)"></g>

    <!-- ═══ SUN ═══ -->
    <g transform="translate(1295, 108)" filter="url(#glow-sun)">
      <circle r="68" fill="none" stroke="#ff8800" stroke-width="1" opacity="0.12"/>
      <circle r="52" fill="none" stroke="#ffaa20" stroke-width="1" opacity="0.18"/>
      <g class="sun-rays-group">

        <line x1="36"  y1="-68" x2="22"  y2="-42" stroke="#ffd040" stroke-width="1.4" opacity="0.4"/>
        <line x1="68"  y1="-36" x2="42"  y2="-22" stroke="#ffd040" stroke-width="1.4" opacity="0.4"/>
        <line x1="68"  y1="36"  x2="42"  y2="22"  stroke="#ffd040" stroke-width="1.4" opacity="0.4"/>
        <line x1="36"  y1="68"  x2="22"  y2="42"  stroke="#ffd040" stroke-width="1.4" opacity="0.4"/>
        <line x1="-36" y1="68"  x2="-22" y2="42"  stroke="#ffd040" stroke-width="1.4" opacity="0.4"/>

        <line x1="-36" y1="-68" x2="-22" y2="-42" stroke="#ffd040" stroke-width="1.4" opacity="0.4"/>
      </g>
      <circle r="35" fill="url(#sunFill)" opacity="0.95"/>
      <circle r="22" fill="#fff8d0"/>
      <circle r="12" fill="white"/>
      <text x="0" y="66" text-anchor="middle" font-family="Share Tech Mono" font-size="7.5"
            fill="#cc8010" letter-spacing="1.5" opacity="0.7">STELLAR ENERGY SOURCE</text>
    </g>

    <!-- Energy beams: sun → ring back arc -->
    <line x1="1237" y1="103" x2="660" y2="311" stroke="#e8a820" stroke-width="0.9" stroke-dasharray="7,5" opacity="0.22" class="energy-beam"/>
    <line x1="1240" y1="108" x2="477" y2="340" stroke="#e8a820" stroke-width="0.9" stroke-dasharray="7,5" opacity="0.18" class="energy-beam" style="animation-delay:0.35s"/>
    <line x1="1240" y1="108" x2="843" y2="326" stroke="#e8a820" stroke-width="0.9" stroke-dasharray="7,5" opacity="0.20" class="energy-beam" style="animation-delay:0.7s"/>

    <!-- ═══ WORMHOLE PORTAL ═══ -->

      <ellipse rx="115" ry="132" fill="none" stroke="rgba(110,5,210,0.18)"   stroke-width="11" class="wh-ring"/>
      <ellipse rx="100" ry="115" fill="none" stroke="rgba(80,15,230,0.26)"   stroke-width="9"  class="wh-ring"/>
      <ellipse rx="84"  ry="97"  fill="none" stroke="rgba(40,80,255,0.38)"   stroke-width="7"  class="wh-ring"/>

      <ellipse rx="70"  ry="82"  fill="rgba(0,80,255,0.05)" filter="url(#glow-md)"/>
    </g>

    <!-- ═══ LASER BEAM ═══ -->
    <g filter="url(#glow-sm)">
      <line x1="219" y1="400" x2="131" y2="400" stroke="rgba(0,200,255,0.25)" stroke-width="10" class="laser-beam" style="animation-delay:0.05s"/>

    <!-- ═══ LASER EMITTER COLLAR ═══ -->
    <g filter="url(#glow-sm)">
      <ellipse cx="221" cy="400" rx="12" ry="50" fill="rgba(0,180,255,0.07)" stroke="#00d4ff" stroke-width="2.5"/>
      <ellipse cx="221" cy="400" rx="12" ry="39" fill="rgba(0,200,255,0.1)"  stroke="#80f0ff" stroke-width="1.2"/>

    </g>

    <!-- ═══ CREW HABITATION MODULE ═══ -->
    <g>
      <rect x="225" y="352" width="192" height="96" fill="url(#habGrad)" stroke="#4888a8" stroke-width="1.5"/>
      <ellipse cx="225" cy="400" rx="14" ry="48" fill="#245870" stroke="#4888a8" stroke-width="1.5"/>
      <ellipse cx="417" cy="400" rx="14" ry="48" fill="#245870" stroke="#4888a8" stroke-width="1.5"/>
      <line x1="270" y1="352" x2="270" y2="448" stroke="#4888a8" stroke-width="1" opacity="0.55"/>
      <line x1="315" y1="352" x2="315" y2="448" stroke="#4888a8" stroke-width="1" opacity="0.55"/>
      <line x1="360" y1="352" x2="360" y2="448" stroke="#4888a8" stroke-width="1" opacity="0.55"/>
      <ellipse cx="252" cy="358" rx="12" ry="7" fill="#80e8d8" opacity="0.75"/>

  <script>
    const svgNS = 'http://www.w3.org/2000/svg';
    const rand  = (a, b) => Math.random() * (b - a) + a;

    // Stars
    const sg = document.getElementById('stars');
    for (let i = 0; i < 280; i++) {
      const s = document.createElementNS(svgNS, 'circle');
      s.setAttribute('cx', rand(0,1400).toFixed(1));
      s.setAttribute('cy', rand(0,800).toFixed(1));
      s.setAttribute('r',  rand(0.3,1.4).toFixed(2));
      s.setAttribute('fill', 'white');
      s.setAttribute('opacity', rand(0.15,0.85).toFixed(2));
      if (Math.random() > 0.7)
        s.style.animation = `star-twinkle ${rand(1.5,5).toFixed(1)}s ease-in-out ${rand(0,5).toFixed(1)}s infinite`;
      sg.appendChild(s);
    }

    // Ring collector geometry
    const CX=660, CY=400, oRx=365, oRy=90, iRx=210, iRy=52, MASK='url(#ringBandMask)';
    function el(tag, a) {
      const e = document.createElementNS(svgNS, tag);
      for (const [k,v] of Object.entries(a)) e.setAttribute(k, v);
      return e;
    }
    function E(rx, ry, a) { return el('ellipse', {cx:CX,cy:CY,rx,ry,...a}); }

    function buildRing(target) {
      target.appendChild(E(oRx, oRy, {fill:'#0b1530', mask:MASK, opacity:'0.95'}));
      // Ring bands
      target.appendChild(E(231, 57,  {fill:'none', stroke:'#0e1e50', 'stroke-width':'22', mask:MASK}));
      target.appendChild(E(281, 69,  {fill:'none', stroke:'#162e7a', 'stroke-width':'52', mask:MASK}));
      target.appendChild(E(281, 69,  {fill:'none', stroke:'#2244a0', 'stroke-width':'22', mask:MASK, opacity:'0.55'}));
      target.appendChild(E(326, 80,  {fill:'none', stroke:'#142870', 'stroke-width':'28', mask:MASK}));
      target.appendChild(E(354, 87,  {fill:'none', stroke:'#0a1530', 'stroke-width':'18', mask:MASK, opacity:'0.6'}));
      // Grid rows
      [[216,53.5,0.60],[232,57,0.55],[250,61.5,0.50],[270,66.5,0.55],
       [290,71.5,0.50],[310,76,0.50],[330,81,0.45],[348,85.5,0.40]].forEach(([rx,ry,op])=>{
        target.appendChild(E(rx,ry,{fill:'none',stroke:'#c09018','stroke-width':'0.7',mask:MASK,opacity:String(op)}));
      });
      // Edge lines
      target.appendChild(E(oRx, oRy, {fill:'none', stroke:'#c89020', 'stroke-width':'1.3', opacity:'0.7'}));
      target.appendChild(E(iRx, iRy, {fill:'none', stroke:'#c89020', 'stroke-width':'1.3', opacity:'0.7'}));
      target.appendChild(E(257,  63,   {fill:'none', stroke:'#4870cc', 'stroke-width':'2',   mask:MASK, opacity:'0.45'}));
      target.appendChild(E(311,  76.5, {fill:'none', stroke:'#3458b0', 'stroke-width':'1.5', mask:MASK, opacity:'0.35'}));
      // Radial grid lines
      for (let d=0; d<360; d+=15) {
        const r = d*Math.PI/180, c=Math.cos(r), s=Math.sin(r);
        target.appendChild(el('line',{
          x1:(CX+iRx*c).toFixed(1), y1:(CY+iRy*s).toFixed(1),
          x2:(CX+oRx*c).toFixed(1), y2:(CY+oRy*s).toFixed(1),
          stroke:'#c09018','stroke-width':'0.6',mask:MASK,opacity:'0.32'
        }));
      }
    }

    buildRing(document.getElementById('ring-collector-back'));
    buildRing(document.getElementById('ring-collector-front'));
